<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Criar Conta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="cadastro.css?v=1.2">

</head>

<body>

<div class="container">

<h1>EstoquePro</h1>
<p class="sub">Criar sua conta</p>

    <input type="text" id="nome" placeholder="Nome do restaurante">

    <input type="text" id="telefone" placeholder="Telefone">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="senha" placeholder="Senha">

    <input type="date" id="nascimento">

    <div class="plan-selection">
        <label class="plan-card">
            <input type="radio" name="plan" value="free" checked>
            <div class="plan-details">
                <h3>Plano Free</h3>
                <p class="price">R$ 0,00</p>
                <ul>
                    <li>Cadastro de Produtos</li>
                    <li>Cadastro de Setores</li>
                    <li>Lançamento de Compras</li>
                    <li>Contagem de Estoque</li>
                </ul>
            </div>
        </label>

        <label class="plan-card">
            <input type="radio" name="plan" value="pro">
            <div class="plan-details">
                <h3>Plano Pro</h3>
                <p class="price">R$ 99,90<span class="period">/mês</span></p>
                <ul>
                    <li><strong>Tudo do plano Free, e mais:</strong></li>
                    <li>Relatórios Avançados</li>
                    <li>Gráficos de Desempenho</li>
                    <li>Integração com IA</li>
                    <li>Até 4 contas de funcionário</li>
                </ul>
            </div>
        </label>
    </div>

    <button onclick="criarConta()">Criar Conta</button>

    <div class="link" onclick="window.location.href='login.html'">
    Já tenho conta
    </div>

    <p id="mensagem"></p>

    </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
    authDomain: "controle-de-estoque-fac87.firebaseapp.com",
    projectId: "controle-de-estoque-fac87",
    storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
    messagingSenderId: "931385340836",
    appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Lógica para a seleção visual dos planos
const planCards = document.querySelectorAll('.plan-card');
function updateSelectedCard() {
    planCards.forEach(card => {
        const radio = card.querySelector('input[type="radio"]');
        if (radio.checked) {
            card.classList.add('selected');
        } else {
            card.classList.remove('selected');
        }
    });
}
planCards.forEach(card => {
    card.addEventListener('click', () => {
        const radio = card.querySelector('input[type="radio"]');
        radio.checked = true;
        updateSelectedCard();
    });
});
updateSelectedCard();


// Função para verificar e processar convites
async function checkForInvitation(email, newUserUid, nome) {
    const invitesRef = collection(db, "convites");
    const q = query(invitesRef, where("email_convidado", "==", email), where("status", "==", "pendente"));
    
    const querySnapshot = await getDocs(q);
    if (!querySnapshot.empty) {
        // Pega o primeiro convite encontrado
        const inviteDoc = querySnapshot.docs[0];
        const inviteData = inviteDoc.data();
        const donoUid = inviteData.dono_uid;

        // Atualiza o documento do novo usuário (funcionário)
        const employeeDocRef = doc(db, "restaurantes", newUserUid);
        await updateDoc(employeeDocRef, {
            plano: 'funcionario',
            restaurante_dono_uid: donoUid,
            nome: nome // Garante que o nome do funcionário seja salvo
        });

        // Atualiza o documento do dono para adicionar o novo funcionário
        const ownerDocRef = doc(db, "restaurantes", donoUid);
        await updateDoc(ownerDocRef, {
            funcionarios: arrayUnion(newUserUid)
        });

        // Atualiza o status do convite
        await updateDoc(inviteDoc.ref, {
            status: 'aceito'
        });

        console.log(`Usuário ${email} vinculado como funcionário de ${donoUid}.`);
        return true; // Indica que um convite foi processado
    }
    return false; // Nenhum convite pendente encontrado
}


window.criarConta = async function() {
    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const nascimento = document.getElementById("nascimento").value;
    const planoSelecionado = document.querySelector('input[name="plan"]:checked').value;

    if (!nome || !email || !senha) {
        document.getElementById("mensagem").innerText = "Nome, email e senha são obrigatórios.";
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
        const user = userCredential.user;

        // Cria o documento inicial do usuário
        await setDoc(doc(db, "restaurantes", user.uid), {
            nome: nome,
            email: email,
            telefone: telefone,
            nascimento: nascimento,
            plano: planoSelecionado, // O plano será 'funcionario' se um convite for encontrado
            dataCadastro: new Date().toISOString()
        });

        // Verifica se há um convite para este e-mail
        const wasInvited = await checkForInvitation(email, user.uid, nome);

        if (wasInvited) {
            alert("Conta criada e vinculada com sucesso à equipe!");
        } else {
            alert("Conta criada com sucesso!");
        }
        
        window.location.href = "login.html";

    } catch (error) {
        // ... (código de tratamento de erro existente)
        if (error.code === 'auth/email-already-in-use') {
            document.getElementById("mensagem").innerText = "Este e-mail já está em uso.";
        } else if (error.code === 'auth/weak-password') {
            document.getElementById("mensagem").innerText = "A senha deve ter pelo menos 6 caracteres.";
        } else {
            document.getElementById("mensagem").innerText = "Ocorreu um erro ao criar a conta.";
        }
        console.error("Erro no cadastro: ", error);
    }
}
</script>
</body>
</html>
